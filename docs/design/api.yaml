openapi: 3.0.3
info:
  title: 勤怠管理 API
  version: 1.0.0
  description: 勤怠管理アプリケーションの REST API

paths:
  # === 認証 ===
  /api/auth/login:
    post:
      tags: [認証]
      summary: ログイン
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 認証失敗

  /api/auth/logout:
    post:
      tags: [認証]
      summary: ログアウト
      responses:
        '200':
          description: ログアウト成功

  /api/auth/me:
    get:
      tags: [認証]
      summary: ログインユーザー情報取得
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'

  # === 打刻 ===
  /api/attendance/clock-in:
    post:
      tags: [打刻]
      summary: 出勤打刻
      responses:
        '200':
          description: 打刻成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecordResponse'
        '409':
          description: 既に出勤打刻済み

  /api/attendance/clock-out:
    post:
      tags: [打刻]
      summary: 退勤打刻
      responses:
        '200':
          description: 打刻成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecordResponse'
        '404':
          description: 出勤打刻がない
        '409':
          description: 既に退勤打刻済み

  /api/attendance/records:
    get:
      tags: [打刻]
      summary: 勤怠記録一覧取得
      parameters:
        - name: yearMonth
          in: query
          required: true
          schema:
            type: string
            example: '2026-07'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AttendanceRecordResponse'

  /api/attendance/records/{id}:
    put:
      tags: [打刻]
      summary: 打刻修正（本人のみ）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceRecordUpdateRequest'
      responses:
        '200':
          description: 修正成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecordResponse'
        '403':
          description: 他人のレコードは修正不可
        '404':
          description: レコードが存在しない

  # === 休暇申請 ===
  /api/leave-requests:
    get:
      tags: [休暇申請]
      summary: 休暇申請一覧取得
      description: 一般社員は自分の申請のみ、管理者は全件取得可能
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaveRequestResponse'
    post:
      tags: [休暇申請]
      summary: 休暇申請作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveRequestCreateRequest'
      responses:
        '201':
          description: 申請作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRequestResponse'

  /api/leave-requests/{id}/approve:
    put:
      tags: [休暇申請]
      summary: 休暇申請承認（管理者のみ）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 承認成功
        '403':
          description: 権限なし

  /api/leave-requests/{id}/reject:
    put:
      tags: [休暇申請]
      summary: 休暇申請却下（管理者のみ）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 却下成功
        '403':
          description: 権限なし

  # === 残業申請 ===
  /api/overtime-requests:
    get:
      tags: [残業申請]
      summary: 残業申請一覧取得
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OvertimeRequestResponse'
    post:
      tags: [残業申請]
      summary: 残業申請作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OvertimeRequestCreateRequest'
      responses:
        '201':
          description: 申請作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OvertimeRequestResponse'

  /api/overtime-requests/{id}/approve:
    put:
      tags: [残業申請]
      summary: 残業申請承認（管理者のみ）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 承認成功
        '403':
          description: 権限なし

  /api/overtime-requests/{id}/reject:
    put:
      tags: [残業申請]
      summary: 残業申請却下（管理者のみ）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 却下成功
        '403':
          description: 権限なし

  # === 月次レポート ===
  /api/reports/monthly:
    get:
      tags: [月次レポート]
      summary: 月次レポート取得（自分）
      parameters:
        - name: yearMonth
          in: query
          required: true
          schema:
            type: string
            example: '2026-07'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyReportResponse'

  /api/reports/monthly/all:
    get:
      tags: [月次レポート]
      summary: 全社員月次レポート取得（管理者のみ）
      parameters:
        - name: yearMonth
          in: query
          required: true
          schema:
            type: string
            example: '2026-07'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MonthlyReportResponse'
        '403':
          description: 権限なし

components:
  schemas:
    # --- 認証 ---
    LoginRequest:
      type: object
      required: [employeeCode, password]
      properties:
        employeeCode:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        employeeCode:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [EMPLOYEE, ADMIN]

    EmployeeResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        employeeCode:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [EMPLOYEE, ADMIN]

    # --- 打刻 ---
    AttendanceRecordResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        date:
          type: string
          format: date
        clockIn:
          type: string
          format: date-time
        clockOut:
          type: string
          format: date-time
          nullable: true
        workMinutes:
          type: integer
          description: 勤務時間（分）
        overtimeMinutes:
          type: integer
          description: 残業時間（分）

    AttendanceRecordUpdateRequest:
      type: object
      required: [clockIn]
      properties:
        clockIn:
          type: string
          format: date-time
        clockOut:
          type: string
          format: date-time
          nullable: true

    # --- 休暇申請 ---
    LeaveRequestCreateRequest:
      type: object
      required: [leaveType, date]
      properties:
        leaveType:
          type: string
          enum: [PAID_LEAVE, ABSENCE]
        date:
          type: string
          format: date
        reason:
          type: string

    LeaveRequestResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        employeeId:
          type: integer
          format: int64
        employeeName:
          type: string
        leaveType:
          type: string
          enum: [PAID_LEAVE, ABSENCE]
        date:
          type: string
          format: date
        reason:
          type: string
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]

    # --- 残業申請 ---
    OvertimeRequestCreateRequest:
      type: object
      required: [date, expectedHours]
      properties:
        date:
          type: string
          format: date
        expectedHours:
          type: number
          format: double
        reason:
          type: string

    OvertimeRequestResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        employeeId:
          type: integer
          format: int64
        employeeName:
          type: string
        date:
          type: string
          format: date
        expectedHours:
          type: number
          format: double
        reason:
          type: string
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]

    # --- 月次レポート ---
    MonthlyReportResponse:
      type: object
      properties:
        employeeId:
          type: integer
          format: int64
        employeeName:
          type: string
        yearMonth:
          type: string
          example: '2026-07'
        workDays:
          type: integer
          description: 勤務日数
        totalWorkMinutes:
          type: integer
          description: 総勤務時間（分）
        totalOvertimeMinutes:
          type: integer
          description: 総残業時間（分）
        paidLeaveDays:
          type: integer
          description: 有給取得日数
        absenceDays:
          type: integer
          description: 欠勤日数

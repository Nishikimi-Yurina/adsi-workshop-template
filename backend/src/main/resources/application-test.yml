spring:
  datasource:
    url: jdbc:h2:mem:attendance;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  servlet:
    session:
      cookie:
        path: /
        same-site: none
        secure: false
